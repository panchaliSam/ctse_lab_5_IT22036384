server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: item-service
            uri: http://localhost:8081
            predicates:
              - Path=/items,/items/**
          - id: order-service
            uri: http://localhost:8082
            predicates:
              - Path=/orders,/orders/**
          - id: payment-service
            uri: http://localhost:8083
            predicates:
              - Path=/payments,/payments/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
